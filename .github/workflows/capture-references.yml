# Manually run examples, capture @@CHECKPOINT@@ output to tests/reference_data/*.json,
# and upload that directory as an artifact for download and insertion into the repo.
name: Capture reference data

on:
  workflow_dispatch:
  push: # Add this temporarily
    branches: [ cursor/agent-setup ]

jobs:
  capture:
    name: Capture and upload
    runs-on: ubuntu-latest

    env:
      OMP_NUM_THREADS: "1"
      OMP_THREAD_LIMIT: "1"
      OMP_DYNAMIC: "FALSE"
      MKL_NUM_THREADS: "1"
      MKL_DYNAMIC: "FALSE"
      OPENBLAS_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      NUMBA_NUM_THREADS: "1"
      PYTHON_CPU_COUNT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run capture script
        run: python tests/_capture_references.py

      - name: Upload reference data
        uses: actions/upload-artifact@v4
        with:
          name: reference_data
          path: tests/reference_data
          retention-days: 2
